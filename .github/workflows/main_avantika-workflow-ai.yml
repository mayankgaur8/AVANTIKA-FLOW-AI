name: Build and deploy Node.js backend to Azure Web App - avantika-workflow-ai

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install backend dependencies
        working-directory: server
        run: npm ci --omit=dev

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          # Upload server/ contents — index.js will be at the artifact root,
          # which is what Azure expects. The frontend is intentionally excluded.
          path: server
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_8FC6DB919D7C4E25B12DD378321470F9 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_9C4E0EFD7C244FE599FCA15B7328239F }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_EC0072C3E3654B5FB5911EC216E5D2C0 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'avantika-workflow-ai'
          slot-name: 'Production'
          # Deploy the downloaded artifact (server/ contents) — index.js is at root
          package: .
